<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Prepwise</title>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    .btn-generate {
      background-color: green;
      border-color: green;
      color: white;
      transition: background-color 0.3s ease; /* Makes the color change smooth */
    }

    .btn-generate:hover {
      background-color: #006400; /* A darker forest green */
      border-color: #006400;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container mt-5 mb-5">

    <h1 class="text-center">Prepwise</h1>
    <h6 class="text-center" style="color: rgb(136, 135, 135);">Add the ingredients you have, we'll create recipes for you</h6>
    <div class="row justify-content-center">
      <div class="col-12 d-flex justify-content-center">

        <div class="card mx-auto rounded-4" style="width: 100%; max-width: 40rem;">

            <div class="card-body text-center" >
                <h3>Your Ingredients</h3>

                <input
                    type="text"
                    id="ingredientInput"
                    class="form-control"
                    placeholder="Type an ingredient..."
                >
                <!-- Suggestions -->
                <ul id="suggestions" class="list-group mt-2"></ul>
                <!-- Selected tags -->

                <div id="tags" class="d-flex flex-wrap gap-2 mt-3"></div>

            </div>

        </div>
      </div>
      <div class="col-12 text-center mb-4">
          <img src="media/veggie_bowl.png" class="img-fluid rounded-4" style="max-height: 300px; width: auto; object-fit: cover;" alt="Delicious Recipe">
      </div>

      <!-- 3. THE BUTTON (Simplified: Removed the extra nested row) -->
      <div class="col-12 text-center">
          <button class="btn btn-generate py-2 px-4" type="submit">
            <i class="bi bi-stars me-2"></i>Generate Recipes
          </button>
      </div>
    </div>  
  </div>
  <!-- Bootstrap 5 JS Bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
  ></script>
  <script src="script.js"></script>
</body>
</html>
